spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.connection-init-sql=ALTER SESSION DISABLE PARALLEL DML
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=${ORACLE_WALLET_DIR}
spring.datasource.hikari.data-source-properties.oracle.net.wallet_location=(SOURCE=(METHOD=FILE)(METHOD_DATA=(DIRECTORY=${ORACLE_WALLET_DIR})))
spring.datasource.hikari.data-source-properties.oracle.net.ssl_server_dn_match=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.h2.console.enabled=false

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}

enrollment.summary.storage=s3
