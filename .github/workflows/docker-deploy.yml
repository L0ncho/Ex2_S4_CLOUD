# Construye la imagen Docker, la publica en Docker Hub y despliega en EC2.
name: Build and Deploy Docker Image

# Se ejecuta al pushear a main o al abrir/actualizar un PR hacia main.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # En PR y en push: solo validamos que el proyecto compile y pase los tests (H2).
  test:
    runs-on: ubuntu-latest
    steps:
      # Trae el código del repositorio al runner de GitHub.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java 21, igual que en pom.xml; cache de Maven acelera runs siguientes.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: ./mvnw test

  # Solo en push a main, después de que test pase: imagen + deploy.
  build-and-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-platform:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # La wallet no va en git (archivos sensibles). La restauramos desde el secret ORACLE_WALLET_BASE64.
      - name: Restore Oracle wallet
        run: |
          echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 -d > wallet.zip
          unzip -o wallet.zip -d .
          # Comprobamos que el zip traiga lo mínimo para mTLS con Oracle Autonomous.
          if [ ! -f Wallet_ENROLLMENTPLATFORMDB/tnsnames.ora ]; then
            echo "Wallet incompleta: falta Wallet_ENROLLMENTPLATFORMDB/tnsnames.ora"
            exit 1
          fi
          if [ ! -f Wallet_ENROLLMENTPLATFORMDB/cwallet.sso ] && [ ! -f Wallet_ENROLLMENTPLATFORMDB/ewallet.pem ]; then
            echo "Wallet incompleta: falta cwallet.sso o ewallet.pem"
            exit 1
          fi

      # Credenciales para subir la imagen a Docker Hub.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construye con el Dockerfile (wallet incluida en /app/wallet) y publica :latest.
      - name: Build and push Docker image
        run: |
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      # Credenciales AWS; el paso de deploy usa SSH, no servicios AWS directamente.
      # AWS_SESSION_TOKEN solo hace falta si las keys son temporales (STS).
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Llave privada para entrar por SSH a la instancia EC2.
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # En EC2: pull de la imagen nueva, reemplaza el contenedor y levanta en el puerto 8080.
      - name: Deploy to EC2
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          # Si no hay secret de URL, usamos el alias high del tnsnames.ora.
          DATASOURCE_URL="${SPRING_DATASOURCE_URL:-jdbc:oracle:thin:@enrollmentplatformdb_high}"
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }}" bash -s << EOF
          set -e
          # EC2 también necesita login para hacer docker pull de una imagen privada.
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker pull "${IMAGE}"
          docker stop enrollment-platform 2>/dev/null || true
          docker rm enrollment-platform 2>/dev/null || true
          docker run -d \
            --name enrollment-platform \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e SPRING_DATASOURCE_URL="${DATASOURCE_URL}" \
            -e SPRING_DATASOURCE_USERNAME="${SPRING_DATASOURCE_USERNAME}" \
            -e SPRING_DATASOURCE_PASSWORD="${SPRING_DATASOURCE_PASSWORD}" \
            -e ORACLE_WALLET_DIR=/app/wallet \
            -e TNS_ADMIN=/app/wallet \
            -e SERVER_PORT=8080 \
            -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
            -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
            -e AWS_SESSION_TOKEN="${AWS_SESSION_TOKEN}" \
            -e AWS_REGION="${AWS_REGION:-us-east-1}" \
            -e AWS_S3_BUCKET="${AWS_S3_BUCKET}" \
            "${IMAGE}"
          EOF
